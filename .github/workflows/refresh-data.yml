name: Refresh data

on:
  schedule:
    - cron: "0 11 * * 2"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache nflreadpy data
        uses: actions/cache@v4
        with:
          path: ~/.cache/nflreadpy
          key: nflreadpy-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            nflreadpy-${{ runner.os }}-

      - name: Install dependencies
        run: pip install .

      - name: Generate JSON data
        run: python -m src.run

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            WEEK=$(python -c "import json; print(json.load(open('docs/data/manifest.json'))['week'])")
            git commit -m "chore: refresh data through week ${WEEK} [skip ci]"
            git push
          fi
