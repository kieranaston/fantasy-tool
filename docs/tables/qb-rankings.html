<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QB Rankings — Fantasy Reference</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/2.1.8/css/dataTables.dataTables.min.css" />
    <link rel="stylesheet" href="../css/site.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/2.1.8/js/dataTables.min.js"></script>
  </head>
  <body>
    <div class="container">
      <p class="site-header">
        <a href="../index.html">Home</a><span class="sep"> · </span>QB Rankings
      </p>
      <p class="meta" data-manifest="summary">Loading…</p>

      <div class="controls" hidden>
        <div>
          <label id="format-label">Format</label>
          <div id="format-toggle" class="format-toggle" role="group" aria-label="Scoring format"></div>
        </div>
      </div>

      <div id="table-container" class="table-wrap">
        <table id="qb-table" class="cell-border order-column">
          <thead>
            <tr>
              <th>
                <span class="th-inner">
                  <span class="th-label">Rank</span>
                  <span class="col-info" tabindex="0" data-tooltip="Composite score rank">i</span>
                </span>
              </th>
              <th>
                <span class="th-inner">
                  <span class="th-label">Player</span>
                  <span class="col-info" tabindex="0" data-tooltip="Player name and team logo">i</span>
                </span>
              </th>
              <th>
                <span class="th-inner">
                  <span class="th-label">GP</span>
                  <span class="col-info" tabindex="0" data-tooltip="Games played">i</span>
                </span>
              </th>
              <th>
                <span class="th-inner">
                  <span class="th-label">Pass Att</span>
                  <span class="col-info" tabindex="0" data-tooltip="Season pass attempts">i</span>
                </span>
              </th>
              <th>
                <span class="th-inner">
                  <span class="th-label">Rush Att</span>
                  <span class="col-info" tabindex="0" data-tooltip="Season rush attempts">i</span>
                </span>
              </th>
              <th>
                <span class="th-inner">
                  <span class="th-label">TD%</span>
                  <span class="col-info" tabindex="0" data-tooltip="TD rate = (pass TDs + rush TDs) / (pass attempts + rush attempts)">i</span>
                </span>
              </th>
              <th>
                <span class="th-inner">
                  <span class="th-label">YPA</span>
                  <span class="col-info" tabindex="0" data-tooltip="Passing yards per attempt">i</span>
                </span>
              </th>
              <th>
                <span class="th-inner">
                  <span class="th-label">Score</span>
                  <span class="col-info" tabindex="0" data-tooltip="Fixed composite: pass attempts, rush attempts, TD rate, and yards per attempt">i</span>
                </span>
              </th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <script type="module">
      import { mountRankingsPage } from "../js/rankings.js";

      mountRankingsPage({
        position: "qb",
        tableId: "qb-table",
        showFormat: false,
        numericTargets: [2, 3, 4, 5, 6, 7],
        metricCells: (row) => `
          <td>${Math.round(row.metrics.pass_attempts)}</td>
          <td>${Math.round(row.metrics.rush_attempts)}</td>
          <td>${(row.metrics.td_rate * 100).toFixed(1)}%</td>
          <td>${row.metrics.yards_per_attempt.toFixed(1)}</td>`,
      });
    </script>
  </body>
</html>
