<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RB Rankings — Fantasy Reference</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/2.1.8/css/dataTables.dataTables.min.css" />
    <link rel="stylesheet" href="../css/site.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/2.1.8/js/dataTables.min.js"></script>
  </head>
  <body>
    <div class="container">
      <p class="site-header">
        <a href="../index.html">Home</a><span class="sep"> · </span>RB Rankings
      </p>
      <p class="meta" data-manifest="summary">Loading…</p>

      <div class="controls">
        <div>
          <label id="format-label">Format</label>
          <div id="format-toggle" class="format-toggle" role="group" aria-label="Scoring format"></div>
        </div>
      </div>

      <div id="table-container" class="table-wrap">
        <table id="rb-table" class="cell-border order-column">
          <thead>
            <tr>
              <th>
                <span class="th-inner">
                  <span class="th-label">Rank</span>
                  <span class="col-info" tabindex="0" data-tooltip="Composite score rank for the selected format">i</span>
                </span>
              </th>
              <th>
                <span class="th-inner">
                  <span class="th-label">Player</span>
                  <span class="col-info" tabindex="0" data-tooltip="Player name and team logo">i</span>
                </span>
              </th>
              <th>
                <span class="th-inner">
                  <span class="th-label">GP</span>
                  <span class="col-info" tabindex="0" data-tooltip="Games played">i</span>
                </span>
              </th>
              <th>
                <span class="th-inner">
                  <span class="th-label">Opp%</span>
                  <span class="col-info" tabindex="0" data-tooltip="Opportunity share = (carries + targets) / team offensive plays">i</span>
                </span>
              </th>
              <th>
                <span class="th-inner">
                  <span class="th-label">YFS</span>
                  <span class="col-info" tabindex="0" data-tooltip="Yards from scrimmage (rushing + receiving)">i</span>
                </span>
              </th>
              <th>
                <span class="th-inner">
                  <span class="th-label">YPC</span>
                  <span class="col-info" tabindex="0" data-tooltip="Yards per carry">i</span>
                </span>
              </th>
              <th>
                <span class="th-inner">
                  <span class="th-label">YAC</span>
                  <span class="col-info" tabindex="0" data-tooltip="Yards after contact per attempt (PFR)">i</span>
                </span>
              </th>
              <th>
                <span class="th-inner">
                  <span class="th-label">Score</span>
                  <span class="col-info" tabindex="0" data-tooltip="Weighted composite of normalized opportunity share, yards from scrimmage, and efficiency">i</span>
                </span>
              </th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <script type="module">
      import { mountRankingsPage } from "../js/rankings.js";

      mountRankingsPage({
        position: "rb",
        tableId: "rb-table",
        showFormat: true,
        numericTargets: [2, 3, 4, 5, 6, 7],
        metricCells: (row) => `
          <td>${(row.metrics.opportunity_share * 100).toFixed(1)}%</td>
          <td>${Math.round(row.metrics.yards_from_scrimmage)}</td>
          <td>${row.metrics.ypc.toFixed(1)}</td>
          <td>${row.metrics.yac_per_attempt.toFixed(1)}</td>`,
      });
    </script>
  </body>
</html>
