<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RB Rankings — Fantasy Reference</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/2.1.8/css/dataTables.dataTables.min.css" />
    <link rel="stylesheet" href="../css/site.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/2.1.8/js/dataTables.min.js"></script>
  </head>
  <body>
    <div class="container">
      <p class="site-header">
        <a href="../index.html">Home</a><span class="sep"> · </span>RB Rankings
      </p>
      <p class="meta" data-manifest="summary">Loading…</p>

      <div id="table-container" class="table-wrap">
        <table id="rb-table" class="cell-border order-column">
          <thead>
            <tr>
              <th>
                <span class="th-inner">
                  <span class="th-label">Rank</span>
                  <span class="col-info" tabindex="0" data-tooltip="Predictive score rank among qualifying RBs">i</span>
                </span>
              </th>
              <th>
                <span class="th-inner">
                  <span class="th-label">Player</span>
                  <span class="col-info" tabindex="0" data-tooltip="Player name and team logo">i</span>
                </span>
              </th>
              <th>
                <span class="th-inner">
                  <span class="th-label">GP</span>
                  <span class="col-info" tabindex="0" data-tooltip="Games played">i</span>
                </span>
              </th>
              <th>
                <span class="th-inner">
                  <span class="th-label">Tch/G</span>
                  <span class="col-info" tabindex="0" data-tooltip="Average touches (carries + targets) per game">i</span>
                </span>
              </th>
              <th>
                <span class="th-inner">
                  <span class="th-label">Snap%</span>
                  <span class="col-info" tabindex="0" data-tooltip="Average offensive snap share — role security signal">i</span>
                </span>
              </th>
              <th>
                <span class="th-inner">
                  <span class="th-label">Adj</span>
                  <span class="col-info" tabindex="0" data-tooltip="TD-regressed half-PPR per game (TD spikes pulled 50% toward average)">i</span>
                </span>
              </th>
              <th>
                <span class="th-inner">
                  <span class="th-label">Score</span>
                  <span class="col-info" tabindex="0" data-tooltip="Weighted z-score: volume, snap share, and TD-adjusted scoring">i</span>
                </span>
              </th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <script type="module">
      import { loadManifest, fetchJSON, showError } from "../js/config.js";
      import { initColumnTooltips } from "../js/tables.js";

      loadManifest();

      function scoreStyle(score, min, max) {
        const t = Math.max(0, Math.min(1, (score - min) / (max - min)));
        const r = Math.round(255 + t * (180 - 255));
        const g = Math.round(255 + t * (236 - 255));
        const b = Math.round(255 + t * (210 - 255));
        return `background:rgb(${r},${g},${b})`;
      }

      const container = document.getElementById("table-container");
      try {
        const data = await fetchJSON("rb/season-composite.json");

        const scores = data.rows.map((r) => r.draft_score);
        const minScore = Math.min(...scores);
        const maxScore = Math.max(...scores);

        const tbody = document.querySelector("#rb-table tbody");
        tbody.innerHTML = data.rows.map((r) => {
          const cellStyle = scoreStyle(r.draft_score, minScore, maxScore);
          const logoHtml = r.logo
            ? `<img class="team-logo" src="${r.logo}" alt="${r.team}">`
            : `<span style="font-weight:600;color:${r.team_color}">${r.team}</span>`;
          return `
            <tr>
              <td>${r.rank}</td>
              <td>
                <div class="player-cell">
                  ${logoHtml}
                  <span>${r.player}</span>
                </div>
              </td>
              <td>${r.games_played}</td>
              <td>${r.volume_pg.toFixed(1)}</td>
              <td>${r.snap_pct.toFixed(1)}%</td>
              <td>${r.adj_ppg.toFixed(1)}</td>
              <td class="score-cell" style="${cellStyle}">${r.draft_score}</td>
            </tr>`;
        }).join("");

        $("#rb-table").DataTable({
          paging:     false,
          searching:  false,
          info:       false,
          order:      [],
          autoWidth:  false,
          dom:        "t",
          columnDefs: [
            { targets: 0,             type: "num" },
            { targets: [2, 3, 4, 5],  type: "num" },
            { targets: 6,             type: "num" },
            { targets: 1,             orderable: false },
          ],
        });

        initColumnTooltips();
      } catch (err) {
        showError(container, err.message);
      }
    </script>
  </body>
</html>
